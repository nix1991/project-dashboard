<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agency Project Monitor</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const INITIAL_PROJECTS = [
      { 
        id: 1, 
        category: 'Infrastructure', 
        title: 'Regional Hospital Wing Expansion', 
        originalCost: 5000000, 
        revisedCost: 5400000, 
        originalStartDate: '2026-01-15', 
        actualStartDate: '2026-01-20', 
        originalCompletionDate: '2027-01-15', 
        actualCompletionDate: '2027-03-15', 
        slippage: '+4.2%', 
        timeElapsed: '5 Months',
        status: 'In Progress' 
      },
      { 
        id: 2, 
        category: 'Medical Equipment', 
        title: 'MRI Machine Procurement', 
        originalCost: 2200000, 
        revisedCost: 2200000, 
        originalStartDate: '2026-03-01', 
        actualStartDate: '2026-03-01', 
        originalCompletionDate: '2026-06-01', 
        actualCompletionDate: '2026-06-01', 
        slippage: '0.0%', 
        timeElapsed: '2 Months',
        status: 'Completed' 
      }
    ];

    function ProjectMonitor() {
      const [activeTab, setActiveTab] = useState('masterlist');
      const [projects, setProjects] = useState(INITIAL_PROJECTS);
      
      // Inline Editing State
      const [editingRowId, setEditingRowId] = useState(null);
      const [editFormData, setEditFormData] = useState({});

      const totalProjects = projects.length;
      const infraCount = projects.filter(p => p.category === 'Infrastructure').length;
      const completedCount = projects.filter(p => p.status === 'Completed').length;

      // Edit Handlers
      const handleEditClick = (project) => {
        setEditingRowId(project.id);
        setEditFormData(project);
      };

      const handleCancelClick = () => {
        setEditingRowId(null);
      };

      const handleSaveClick = () => {
        setProjects(projects.map(p => p.id === editingRowId ? editFormData : p));
        setEditingRowId(null);
      };

      const handleFormChange = (e, field) => {
        setEditFormData({ ...editFormData, [field]: e.target.value });
      };

      return (
        <div>
          {/* Header */}
          <header className="bg-blue-900 text-white shadow-md border-b border-blue-800">
            <div className="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
              <div>
                <h1 className="text-2xl font-bold tracking-tight">Agency Project Monitor</h1>
                <p className="text-xs text-blue-200 mt-0.5">Real-time Project Tracking</p>
              </div>
            </div>
          </header>

          {/* Tabs */}
          <div className="bg-white border-b border-slate-200 shadow-sm">
            <div className="max-w-7xl mx-auto px-6 flex space-x-8 overflow-x-auto">
              <button onClick={() => setActiveTab('dashboard')} className={`whitespace-nowrap py-4 px-2 font-medium text-sm border-b-2 ${activeTab === 'dashboard' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}>Dashboard Summary</button>
              <button onClick={() => setActiveTab('masterlist')} className={`whitespace-nowrap py-4 px-2 font-medium text-sm border-b-2 ${activeTab === 'masterlist' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}>Project Masterlist ({projects.length})</button>
            </div>
          </div>

          <main className="max-w-[95%] mx-auto px-4 py-8">
            {/* Dashboard View */}
            {activeTab === 'dashboard' && (
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-7xl mx-auto">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                  <p className="text-xs font-semibold text-slate-400 uppercase">Total Tracked</p>
                  <p className="text-3xl font-bold text-blue-900 mt-2">{totalProjects}</p>
                </div>
                <div className="bg-white p-6 rounded-xl shadow-sm border border-blue-100 bg-blue-50">
                  <p className="text-xs font-semibold text-blue-600 uppercase">Infrastructure</p>
                  <p className="text-3xl font-bold text-blue-900 mt-2">{infraCount}</p>
                </div>
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                  <p className="text-xs font-semibold text-slate-400 uppercase">Completed</p>
                  <p className="text-3xl font-bold text-emerald-600 mt-2">{completedCount}</p>
                </div>
              </div>
            )}

            {/* Masterlist View */}
            {activeTab === 'masterlist' && (
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-x-auto">
                <table className="w-full text-left border-collapse whitespace-nowrap">
                  <thead>
                    <tr className="bg-slate-50 border-b border-slate-200 text-xs font-bold text-slate-600 tracking-wider">
                      <th className="p-3">Category</th>
                      <th className="p-3">Project Title</th>
                      <th className="p-3">Cost (Orig / Rev)</th>
                      <th className="p-3">Orig Start</th>
                      <th className="p-3">Actual Start</th>
                      <th className="p-3">Orig Comp</th>
                      <th className="p-3">Actual Comp</th>
                      <th className="p-3">Slippage</th>
                      <th className="p-3">Elapsed</th>
                      <th className="p-3">Status</th>
                      <th className="p-3 sticky right-0 bg-slate-50 shadow-[-4px_0_6px_-1px_rgba(0,0,0,0.05)] text-center">Actions</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100 text-sm">
                    {projects.map((project) => {
                      const isEditing = editingRowId === project.id;
                      return (
                        <tr key={project.id} className="hover:bg-slate-50/50 transition-colors">
                          <td className="p-3">
                            {isEditing ? (
                              <select value={editFormData.category} onChange={(e) => handleFormChange(e, 'category')} className="border rounded p-1 w-full text-xs">
                                <option>Infrastructure</option>
                                <option>Facility Equipment</option>
                                <option>Medical Equipment</option>
                                <option>Other Projects</option>
                              </select>
                            ) : (
                              <span className="font-semibold text-blue-800">{project.category}</span>
                            )}
                          </td>
                          <td className="p-3">
                            {isEditing ? (
                              <input type="text" value={editFormData.title} onChange={(e) => handleFormChange(e, 'title')} className="border rounded p-1 w-full min-w-[150px] text-xs" />
                            ) : (
                              <span className="font-semibold text-slate-900">{project.title}</span>
                            )}
                          </td>
                          <td className="p-3">
                            {isEditing ? (
                              <div className="space-y-1">
                                <input type="number" value={editFormData.originalCost} onChange={(e) => handleFormChange(e, 'originalCost')} placeholder="Orig Cost" className="border rounded p-1 w-full text-xs" />
                                <input type="number" value={editFormData.revisedCost} onChange={(e) => handleFormChange(e, 'revisedCost')} placeholder="Rev Cost" className="border rounded p-1 w-full text-xs" />
                              </div>
                            ) : (
                              <div className="flex flex-col">
                                <span>Php {Number(project.originalCost).toLocaleString()}</span>
                                <span className="text-xs text-slate-400">Php {Number(project.revisedCost).toLocaleString()}</span>
                              </div>
                            )}
                          </td>
                          <td className="p-3">
                            {isEditing ? (
                              <input type="date" value={editFormData.originalStartDate} onChange={(e) => handleFormChange(e, 'originalStartDate')} className="border rounded p-1 w-full text-xs" />
                            ) : project.originalStartDate}
                          </td>
                          <td className="p-3">
                            {isEditing ? (
                              <input type="date" value={editFormData.actualStartDate} onChange={(e) => handleFormChange(e, 'actualStartDate')} className="border rounded p-1 w-full text-xs" />
                            ) : project.actualStartDate}
                          </td>
                          <td className="p-3">
                            {isEditing ? (
                              <input type="date" value={editFormData.originalCompletionDate} onChange={(e) => handleFormChange(e, 'originalCompletionDate')} className="border rounded p-1 w-full text-xs" />
                            ) : project.originalCompletionDate}
                          </td>
                          <td className="p-3">
                            {isEditing ? (
                              <input type="date" value={editFormData.actualCompletionDate} onChange={(e) => handleFormChange(e, 'actualCompletionDate')} className="border rounded p-1 w-full text-xs" />
                            ) : project.actualCompletionDate}
                          </td>
                          <td className="p-3">
                            {isEditing ? (
                              <input type="text" value={editFormData.slippage} onChange={(e) => handleFormChange(e, 'slippage')} className="border rounded p-1 w-full min-w-[70px] text-xs" />
                            ) : (
                              <span className={`font-bold ${project.slippage.startsWith('-') ? 'text-emerald-600' : project.slippage === '0.0%' ? 'text-slate-500' : 'text-rose-600'}`}>{project.slippage}</span>
                            )}
                          </td>
                          <td className="p-3">
                            {isEditing ? (
                              <input type="text" value={editFormData.timeElapsed} onChange={(e) => handleFormChange(e, 'timeElapsed')} className="border rounded p-1 w-full min-w-[80px] text-xs" />
                            ) : project.timeElapsed}
                          </td>
                          <td className="p-3">
                            {isEditing ? (
                              <select value={editFormData.status} onChange={(e) => handleFormChange(e, 'status')} className="border rounded p-1 w-full text-xs">
                                <option>Pipeline</option>
                                <option>In Progress</option>
                                <option>Suspended</option>
                                <option>Completed</option>
                              </select>
                            ) : (
                              <span className={`px-2 py-1 rounded text-xs font-semibold ${project.status === 'Completed' ? 'bg-emerald-100 text-emerald-800' : 'bg-blue-100 text-blue-800'}`}>
                                {project.status}
                              </span>
                            )}
                          </td>
                          <td className="p-3 sticky right-0 bg-white shadow-[-4px_0_6px_-1px_rgba(0,0,0,0.05)] text-center">
                            {isEditing ? (
                              <div className="flex flex-col gap-1">
                                <button onClick={handleSaveClick} className="bg-emerald-600 text-white px-3 py-1 rounded text-xs font-bold hover:bg-emerald-700 transition">Save</button>
                                <button onClick={handleCancelClick} className="bg-slate-200 text-slate-700 px-3 py-1 rounded text-xs font-bold hover:bg-slate-300 transition">Cancel</button>
                              </div>
                            ) : (
                              <button onClick={() => handleEditClick(project)} className="text-blue-600 hover:text-blue-800 font-bold text-xs underline underline-offset-2">Edit Row</button>
                            )}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ProjectMonitor />);
  </script>
</body>
</html>
