<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agency Project Monitor</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const INITIAL_PROJECTS = [
      { id: 1, category: 'Infrastructure', title: 'Regional Hospital Wing Expansion', description: 'Construction of a new 4-story medical wing.', originalCost: 5000000, revisedCost: 5400000, originalDuration: '12 Months', revisedDuration: '14 Months', originalStartDate: '2026-01-15', revisedStartDate: '2026-01-15', originalCompletionDate: '2027-01-15', revisedCompletionDate: '2027-03-15', timeElapsed: '5 Months', slippage: '+4.2%', status: 'In Progress', remarks: 'Delayed due to supply chain issues.' },
      { id: 2, category: 'Medical Equipment', title: 'MRI Machine Procurement', description: 'Acquisition and installation of 3 Tesla MRI scanners.', originalCost: 2200000, revisedCost: 2200000, originalDuration: '3 Months', revisedDuration: '3 Months', originalStartDate: '2026-03-01', revisedStartDate: '2026-03-01', originalCompletionDate: '2026-06-01', revisedCompletionDate: '2026-06-01', timeElapsed: '2 Months', slippage: '0.0%', status: 'Completed', remarks: 'Successfully calibrated.' }
    ];

    function ProjectMonitor() {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [projects, setProjects] = useState(INITIAL_PROJECTS);
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [selectedCategory, setSelectedCategory] = useState('Infrastructure');
      
      const totalProjects = projects.length;
      const infraCount = projects.filter(p => p.category === 'Infrastructure').length;
      const completedCount = projects.filter(p => p.status === 'Completed').length;

      return (
        <div>
          {/* Header */}
          <header className="bg-blue-900 text-white shadow-md border-b border-blue-800">
            <div className="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
              <div>
                <h1 className="text-2xl font-bold tracking-tight">Agency Project Monitor</h1>
                <p className="text-xs text-blue-200 mt-0.5">Real-time Project Tracking</p>
              </div>
              <button onClick={() => setIsModalOpen(true)} className="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all shadow-sm">
                + Add New Project
              </button>
            </div>
          </header>

          {/* Tabs */}
          <div className="bg-white border-b border-slate-200 shadow-sm">
            <div className="max-w-7xl mx-auto px-6 flex space-x-8">
              <button onClick={() => setActiveTab('dashboard')} className={`py-4 px-2 font-medium text-sm border-b-2 ${activeTab === 'dashboard' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}>Dashboard Summary</button>
              <button onClick={() => setActiveTab('masterlist')} className={`py-4 px-2 font-medium text-sm border-b-2 ${activeTab === 'masterlist' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}>Project Masterlist ({projects.length})</button>
            </div>
          </div>

          <main className="max-w-7xl mx-auto px-6 py-8">
            {/* Dashboard View */}
            {activeTab === 'dashboard' && (
              <div className="space-y-8">
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                  <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <p className="text-xs font-semibold text-slate-400">Total Tracked</p>
                    <p className="text-3xl font-bold text-blue-900 mt-2">{totalProjects}</p>
                  </div>
                  <div className="bg-white p-6 rounded-xl shadow-sm border border-blue-100 bg-blue-50">
                    <p className="text-xs font-semibold text-blue-600">Infrastructure</p>
                    <p className="text-3xl font-bold text-blue-900 mt-2">{infraCount}</p>
                  </div>
                  <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <p className="text-xs font-semibold text-slate-400">Completed</p>
                    <p className="text-3xl font-bold text-emerald-600 mt-2">{completedCount}</p>
                  </div>
                </div>
              </div>
            )}

            {/* Masterlist View */}
            {activeTab === 'masterlist' && (
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-x-auto">
                <table className="w-full text-left border-collapse min-w-max">
                  <thead>
                    <tr className="bg-slate-50 border-b border-slate-200 text-xs font-semibold text-slate-500 tracking-wider">
                      <th className="p-4">Category</th>
                      <th className="p-4">Project Title</th>
                      <th className="p-4">Cost (Orig / Rev)</th>
                      <th className="p-4">Status</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100 text-sm">
                    {projects.map((project) => (
                      <tr key={project.id}>
                        <td className="p-4 font-semibold text-blue-800">{project.category}</td>
                        <td className="p-4 font-semibold text-slate-900">{project.title}</td>
                        <td className="p-4">${project.originalCost.toLocaleString()} / ${project.revisedCost.toLocaleString()}</td>
                        <td className="p-4">{project.status}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </main>

          {/* Modal Pop-up */}
          {isModalOpen && (
            <div className="fixed inset-0 z-50 bg-slate-900/40 flex items-center justify-center p-4">
              <div className="bg-white rounded-xl shadow-xl max-w-lg w-full overflow-hidden">
                <div className="bg-blue-900 text-white px-6 py-4 flex justify-between">
                  <h3 className="font-bold">Add New Project</h3>
                  <button onClick={() => setIsModalOpen(false)} className="font-bold">&times;</button>
                </div>
                <div className="p-6 text-center text-slate-600">
                  <p>This is your popup window for entering new project details.</p>
                  <button onClick={() => setIsModalOpen(false)} className="mt-4 px-4 py-2 bg-blue-600 text-white rounded-lg">Close Window</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ProjectMonitor />);
  </script>
</body>
</html>
