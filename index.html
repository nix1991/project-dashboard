<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agency Project Monitor</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ==========================================
    // ⚠️ PASTE YOUR FIREBASE CONFIGURATION HERE
    // ==========================================
    // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyDnaMR7ePIsCEYjE6N3Py9rGvxKSwHwMRM",
  authDomain: "agency-project-monitor.firebaseapp.com",
  projectId: "agency-project-monitor",
  storageBucket: "agency-project-monitor.firebasestorage.app",
  messagingSenderId: "576801822892",
  appId: "1:576801822892:web:9acc7293573dff5a1fe709"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);

    // Initialize Database
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // Default Data (Used to auto-seed an empty database)
    const SEED_DATA = [
      { category: 'Infrastructure', title: 'Regional Hospital Wing Expansion', originalCost: 5000000, revisedCost: 5400000, originalStartDate: '2026-01-15', actualStartDate: '2026-01-20', originalCompletionDate: '2027-01-15', actualCompletionDate: '2027-03-15', slippage: '+4.2%', timeElapsed: '5 Months', status: 'In Progress' },
      { category: 'Medical Equipment', title: 'MRI Machine Procurement', originalCost: 2200000, revisedCost: 2200000, originalStartDate: '2026-03-01', actualStartDate: '2026-03-01', originalCompletionDate: '2026-06-01', actualCompletionDate: '2026-06-01', slippage: '0.0%', timeElapsed: '2 Months', status: 'Completed' }
    ];

    function ProjectMonitor() {
      const [activeTab, setActiveTab] = useState('masterlist');
      const [projects, setProjects] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      
      const [editingRowId, setEditingRowId] = useState(null);
      const [editFormData, setEditFormData] = useState({});
      
      // Modal State for Adding Projects
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [newProject, setNewProject] = useState({
        category: 'Infrastructure', title: '', originalCost: 0, revisedCost: 0, originalStartDate: '', actualStartDate: '', originalCompletionDate: '', actualCompletionDate: '', slippage: '0.0%', timeElapsed: '0 Months', status: 'Pipeline'
      });

      // FIREBASE SYNC: Listen to database in real-time
      useEffect(() => {
        const unsubscribe = db.collection('projects').onSnapshot((snapshot) => {
          if (snapshot.empty) {
            // Auto-seed database if empty
            SEED_DATA.forEach(data => db.collection('projects').add(data));
          } else {
            const projectsData = [];
            snapshot.forEach(doc => projectsData.push({ id: doc.id, ...doc.data() }));
            setProjects(projectsData);
          }
          setIsLoading(false);
        });
        return () => unsubscribe();
      }, []);

      // FIREBASE WRITE: Save edits
      const handleSaveClick = async () => {
        const { id, ...dataToUpdate } = editFormData;
        await db.collection('projects').doc(id).update(dataToUpdate);
        setEditingRowId(null);
      };

      // FIREBASE WRITE: Add new project
      const handleAddNewProject = async (e) => {
        e.preventDefault();
        await db.collection('projects').add(newProject);
        setIsModalOpen(false);
        setNewProject({ ...newProject, title: '', originalCost: 0, revisedCost: 0 }); // Reset
      };

      if (isLoading) return <div className="min-h-screen flex items-center justify-center font-bold text-blue-900">Loading Cloud Database...</div>;

      return (
        <div>
          <header className="bg-blue-900 text-white shadow-md border-b border-blue-800">
            <div className="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
              <div>
                <h1 className="text-2xl font-bold tracking-tight">Agency Project Monitor</h1>
                <div className="flex items-center gap-2 mt-0.5">
                  <span className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                  <p className="text-xs text-blue-200">Cloud Sync Active</p>
                </div>
              </div>
              <button onClick={() => setIsModalOpen(true)} className="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all shadow-sm">
                + Add New Project
              </button>
            </div>
          </header>

          <div className="bg-white border-b border-slate-200 shadow-sm">
            <div className="max-w-7xl mx-auto px-6 flex space-x-8">
              <button onClick={() => setActiveTab('dashboard')} className={`py-4 px-2 font-medium text-sm border-b-2 ${activeTab === 'dashboard' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}>Dashboard Summary</button>
              <button onClick={() => setActiveTab('masterlist')} className={`py-4 px-2 font-medium text-sm border-b-2 ${activeTab === 'masterlist' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}>Project Masterlist ({projects.length})</button>
            </div>
          </div>

          <main className="max-w-[95%] mx-auto px-4 py-8">
            {activeTab === 'dashboard' && (
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-7xl mx-auto">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                  <p className="text-xs font-semibold text-slate-400 uppercase">Total Tracked</p>
                  <p className="text-3xl font-bold text-blue-900 mt-2">{projects.length}</p>
                </div>
                <div className="bg-white p-6 rounded-xl shadow-sm border border-blue-100 bg-blue-50">
                  <p className="text-xs font-semibold text-blue-600 uppercase">Infrastructure</p>
                  <p className="text-3xl font-bold text-blue-900 mt-2">{projects.filter(p => p.category === 'Infrastructure').length}</p>
                </div>
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                  <p className="text-xs font-semibold text-slate-400 uppercase">Completed</p>
                  <p className="text-3xl font-bold text-emerald-600 mt-2">{projects.filter(p => p.status === 'Completed').length}</p>
                </div>
              </div>
            )}

            {activeTab === 'masterlist' && (
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-x-auto">
                <table className="w-full text-left border-collapse whitespace-nowrap">
                  <thead>
                    <tr className="bg-slate-50 border-b border-slate-200 text-xs font-bold text-slate-600 tracking-wider">
                      <th className="p-3">Category</th>
                      <th className="p-3">Project Title</th>
                      <th className="p-3">Cost (Orig / Rev)</th>
                      <th className="p-3">Orig Start</th>
                      <th className="p-3">Actual Start</th>
                      <th className="p-3">Orig Comp</th>
                      <th className="p-3">Actual Comp</th>
                      <th className="p-3">Slippage</th>
                      <th className="p-3">Elapsed</th>
                      <th className="p-3">Status</th>
                      <th className="p-3 sticky right-0 bg-slate-50 shadow-[-4px_0_6px_-1px_rgba(0,0,0,0.05)] text-center">Actions</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100 text-sm">
                    {projects.map((project) => {
                      const isEditing = editingRowId === project.id;
                      return (
                        <tr key={project.id} className="hover:bg-slate-50/50 transition-colors">
                          <td className="p-3">
                            {isEditing ? (
                              <select value={editFormData.category} onChange={(e) => setEditFormData({...editFormData, category: e.target.value})} className="border rounded p-1 w-full text-xs">
                                <option>Infrastructure</option><option>Facility Equipment</option><option>Medical Equipment</option><option>Other Projects</option>
                              </select>
                            ) : <span className="font-semibold text-blue-800">{project.category}</span>}
                          </td>
                          <td className="p-3">
                            {isEditing ? (
                              <input type="text" value={editFormData.title} onChange={(e) => setEditFormData({...editFormData, title: e.target.value})} className="border rounded p-1 w-full min-w-[150px] text-xs" />
                            ) : <span className="font-semibold text-slate-900">{project.title}</span>}
                          </td>
                          <td className="p-3">
                            {isEditing ? (
                              <div className="space-y-1">
                                <input type="number" value={editFormData.originalCost} onChange={(e) => setEditFormData({...editFormData, originalCost: e.target.value})} className="border rounded p-1 w-full text-xs" />
                                <input type="number" value={editFormData.revisedCost} onChange={(e) => setEditFormData({...editFormData, revisedCost: e.target.value})} className="border rounded p-1 w-full text-xs" />
                              </div>
                            ) : (
                              <div className="flex flex-col">
                                <span>Php {Number(project.originalCost).toLocaleString()}</span>
                                <span className="text-xs text-slate-400">Php {Number(project.revisedCost).toLocaleString()}</span>
                              </div>
                            )}
                          </td>
                          <td className="p-3">{isEditing ? <input type="date" value={editFormData.originalStartDate} onChange={(e) => setEditFormData({...editFormData, originalStartDate: e.target.value})} className="border rounded p-1 text-xs" /> : project.originalStartDate}</td>
                          <td className="p-3">{isEditing ? <input type="date" value={editFormData.actualStartDate} onChange={(e) => setEditFormData({...editFormData, actualStartDate: e.target.value})} className="border rounded p-1 text-xs" /> : project.actualStartDate}</td>
                          <td className="p-3">{isEditing ? <input type="date" value={editFormData.originalCompletionDate} onChange={(e) => setEditFormData({...editFormData, originalCompletionDate: e.target.value})} className="border rounded p-1 text-xs" /> : project.originalCompletionDate}</td>
                          <td className="p-3">{isEditing ? <input type="date" value={editFormData.actualCompletionDate} onChange={(e) => setEditFormData({...editFormData, actualCompletionDate: e.target.value})} className="border rounded p-1 text-xs" /> : project.actualCompletionDate}</td>
                          <td className="p-3">{isEditing ? <input type="text" value={editFormData.slippage} onChange={(e) => setEditFormData({...editFormData, slippage: e.target.value})} className="border rounded p-1 w-full min-w-[60px] text-xs" /> : <span className="font-bold">{project.slippage}</span>}</td>
                          <td className="p-3">{isEditing ? <input type="text" value={editFormData.timeElapsed} onChange={(e) => setEditFormData({...editFormData, timeElapsed: e.target.value})} className="border rounded p-1 w-full min-w-[70px] text-xs" /> : project.timeElapsed}</td>
                          <td className="p-3">
                            {isEditing ? (
                              <select value={editFormData.status} onChange={(e) => setEditFormData({...editFormData, status: e.target.value})} className="border rounded p-1 w-full text-xs">
                                <option>Pipeline</option><option>In Progress</option><option>Suspended</option><option>Completed</option>
                              </select>
                            ) : <span className={`px-2 py-1 rounded text-xs font-semibold ${project.status === 'Completed' ? 'bg-emerald-100 text-emerald-800' : 'bg-blue-100 text-blue-800'}`}>{project.status}</span>}
                          </td>
                          <td className="p-3 sticky right-0 bg-white shadow-[-4px_0_6px_-1px_rgba(0,0,0,0.05)] text-center">
                            {isEditing ? (
                              <div className="flex flex-col gap-1">
                                <button onClick={handleSaveClick} className="bg-emerald-600 text-white px-3 py-1 rounded text-xs font-bold">Save</button>
                                <button onClick={() => setEditingRowId(null)} className="bg-slate-200 text-slate-700 px-3 py-1 rounded text-xs font-bold">Cancel</button>
                              </div>
                            ) : (
                              <button onClick={() => { setEditingRowId(project.id); setEditFormData(project); }} className="text-blue-600 hover:text-blue-800 font-bold text-xs underline">Edit</button>
                            )}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </main>

          {/* ADD NEW PROJECT MODAL */}
          {isModalOpen && (
            <div className="fixed inset-0 z-50 bg-slate-900/50 flex items-center justify-center p-4">
              <div className="bg-white rounded-xl shadow-xl max-w-xl w-full overflow-hidden">
                <div className="bg-blue-900 text-white px-6 py-4 flex justify-between">
                  <h3 className="font-bold">Add New Project</h3>
                  <button onClick={() => setIsModalOpen(false)} className="font-bold text-xl">&times;</button>
                </div>
                <form onSubmit={handleAddNewProject} className="p-6 space-y-4 max-h-[75vh] overflow-y-auto">
                  <div>
                    <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Project Title</label>
                    <input type="text" required value={newProject.title} onChange={(e) => setNewProject({...newProject, title: e.target.value})} className="border rounded-lg p-2 w-full text-sm" />
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Original Cost (Php)</label>
                      <input type="number" required value={newProject.originalCost} onChange={(e) => setNewProject({...newProject, originalCost: e.target.value})} className="border rounded-lg p-2 w-full text-sm" />
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Status</label>
                      <select value={newProject.status} onChange={(e) => setNewProject({...newProject, status: e.target.value})} className="border rounded-lg p-2 w-full text-sm">
                        <option>Pipeline</option><option>In Progress</option><option>Suspended</option><option>Completed</option>
                      </select>
                    </div>
                  </div>
                  <div className="flex justify-end pt-4 border-t border-slate-100 gap-2">
                    <button type="button" onClick={() => setIsModalOpen(false)} className="px-4 py-2 border rounded-lg text-sm font-semibold">Cancel</button>
                    <button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-semibold">Save to Database</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ProjectMonitor />);
  </script>
</body>
</html>
